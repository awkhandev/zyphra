version: 2
updates:
  # Keep npm dependencies up to date (patch updates only)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "deps"
      include: scope
    # Only allow patch-level updates to prevent breaking changes
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

  # Keep GitHub Actions up to date (patch updates only)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
      - ci
    commit-message:
      prefix: "ci"
      include: scope
    # Only allow patch-level updates to prevent breaking changes
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
